function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}

function midiToFreq(m){return 440*Math.pow(2,(m-69)/12)}

function playNote(midi,dur=0.8){
const ctx=getAudioCtx();const now=ctx.currentTime;const freq=midiToFreq(midi);
const osc1=ctx.createOscillator();osc1.type='triangle';osc1.frequency.value=freq;
const osc2=ctx.createOscillator();osc2.type='sine';osc2.frequency.value=freq*2;
const osc3=ctx.createOscillator();osc3.type='sine';osc3.frequency.value=freq*3;
const g1=ctx.createGain();const g2=ctx.createGain();const g3=ctx.createGain();
g1.gain.setValueAtTime(0.35,now);g1.gain.exponentialRampToValueAtTime(0.001,now+dur);
g2.gain.setValueAtTime(0.12,now);g2.gain.exponentialRampToValueAtTime(0.001,now+dur*0.6);
g3.gain.setValueAtTime(0.04,now);g3.gain.exponentialRampToValueAtTime(0.001,now+dur*0.4);
osc1.connect(g1);g1.connect(ctx.destination);
osc2.connect(g2);g2.connect(ctx.destination);
osc3.connect(g3);g3.connect(ctx.destination);
osc1.start(now);osc2.start(now);osc3.start(now);
osc1.stop(now+dur);osc2.stop(now+dur*0.6);osc3.stop(now+dur*0.4);
}

function playChord(midiNotes,strumDelay=0.04){
midiNotes.forEach((n,i)=>{setTimeout(()=>playNote(n,1.5),i*strumDelay*1000)});
}

function playScale(midiNotes){
midiNotes.forEach((n,i)=>{setTimeout(()=>playNote(n,0.5),i*250)});
}

neapolitan:{E:{off:[0,1,1,-1,-1,-1],rs:5,bm:40}},
lydChord:{E:{off:[0,2,0,1,2,0],rs:5,bm:40}},
tristan:{E:{off:[0,2,1,1,2,0],rs:5,bm:40}},
petrushka:{E:{off:[0,1,0,0,0,0],rs:5,bm:40}},
midiChord:{E:{off:[0,1,-1,-1,0,0],rs:5,bm:40}},
soWhat:{A:{off:[-1,0,2,2,3,0],rs:4,bm:45}},
};

function getChordPosition(rootIdx,chordId){
const rootMidi=60+rootIdx;
const shapes=CHORD_SHAPES[chordId];
if(!shapes)return generateChordPosition(rootIdx,chordId);
let best=null;let bestFret=99;
for(let key in shapes){
const s=shapes[key];
let barreFret=rootMidi-s.bm;
if(barreFret<0)barreFret+=12;
if(barreFret>12)continue;
const pos=s.off.map(o=>o===-1?-1:barreFret+o);
const maxF=Math.max(...pos.filter(p=>p!==-1));
const minF=Math.min(...pos.filter(p=>p!==-1));
if(maxF-minF<=4&&maxF<=12){
if(maxF<bestFret){bestFret=maxF;best=pos;}
}
}
if(!best){
for(let key in shapes){
const s=shapes[key];
let barreFret=rootMidi-s.bm;
if(barreFret<0)barreFret+=12;
if(barreFret>15)barreFret-=12;
const pos=s.off.map(o=>o===-1?-1:barreFret+o);
if(!best)best=pos;
}
}
return best||generateChordPosition(rootIdx,chordId);
}

function generateChordPosition(rootIdx,chordType){
const allTypes=[].concat(...CHORD_TYPES.map(c=>c.items));
const ct=allTypes.find(t=>t.id===chordType);
if(!ct)return[0,2,2,1,0,0];
const intervals=ct.int;
const rootMidi=60+rootIdx;
const pcs=intervals.map(i=>(rootMidi+i)%12);
const pos=[];
for(let s=0;s<6;s++){
let found=-1;
for(let f=0;f<=12;f++){
if(pcs.includes((STRINGS_MIDI[s]+f)%12)){found=f;break;}
}
pos.push(found);
}
return pos;
}

function getChordNotes(rootIdx,chordId){
const allTypes=[].concat(...CHORD_TYPES.map(c=>c.items));
const ct=allTypes.find(t=>t.id===chordId);
if(!ct)return[];
const pos=getChordPosition(rootIdx,chordId);
const notes=[];
for(let s=0;s<6;s++){
if(pos[s]!==-1){notes.push(STRINGS_MIDI[s]+pos[s]);}
}
return notes;
}

function getScaleNotes(rootIdx,scaleId){
const allTypes=[].concat(...SCALE_TYPES.map(c=>c.items));
const st=allTypes.find(t=>t.id===scaleId);
if(!st)return[];
return st.int.map(i=>60+rootIdx+i);
}

function getScaleTab(rootIdx,scaleId){
const allTypes=[].concat(...SCALE_TYPES.map(c=>c.items));
const st=allTypes.find(t=>t.id===scaleId);
if(!st)return[];
const pcs=st.int.map(i=>(rootIdx+i)%12);
const tab=[];
for(let s=0;s<6;s++){
const strNotes=[];
for(let f=0;f<=15;f++){
if(pcs.includes((STRINGS_MIDI[s]+f)%12)){
strNotes.push({fret:f,midi:STRINGS_MIDI[s]+f});
}
}
tab.push(strNotes);
}
return tab;
}

function renderChordDiagramSVG(pos){
const w=140,h=170;
const startX=20,startY=30;
const strGap=20,fretGap=28;
let svg=`<svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">`;
// Nut or fret number
const minFret=Math.min(...pos.filter(p=>p!==-1&&p>0));
const showNut=minFret<=0||minFret===Infinity;
if(showNut){
svg+=`<rect x="${startX}" y="${startY-3}" width="${strGap*5}" height="4" fill="#ccc" rx="1"/>`;
}else{
svg+=`<text x="${startX-12}" y="${startY+16}" fill="#e6a817" font-size="12" font-weight="bold">${minFret}</text>`;
}
// Fret lines
for(let f=0;f<=5;f++){
const y=startY+f*fretGap;
svg+=`<line x1="${startX}" y1="${y}" x2="${startX+strGap*5}" y2="${y}" stroke="#555" stroke-width="1"/>`;
}
// String lines
for(let s=0;s<6;s++){
const x=startX+s*strGap;
svg+=`<line x1="${x}" y1="${startY}" x2="${x}" y2="${startY+5*fretGap}" stroke="#888" stroke-width="${s<3?1.5:1}"/>`;
}
// Finger positions
const baseFret=showNut?0:minFret-1;
for(let s=0;s<6;s++){
const x=startX+s*strGap;
if(pos[s]===-1){
svg+=`<text x="${x}" y="${startY-8}" fill="#888" font-size="12" text-anchor="middle">×</text>`;
}else if(pos[s]===0){
svg+=`<circle cx="${x}" cy="${startY-1}" r="6" fill="#e6a817" stroke="#0f0f1a" stroke-width="1"/>`;
}else{
const fret=pos[s]-baseFret;
if(fret>0&&fret<=5){
const y=startY+(fret-0.5)*fretGap;
svg+=`<circle cx="${x}" cy="${y}" r="8" fill="#e6a817" stroke="#0f0f1a" stroke-width="1" class="cursor-pointer" onmouseenter="playNote(${STRINGS_MIDI[s]+pos[s]})"/>`;
svg+=`<text x="${x}" y="${y+4}" fill="#0f0f1a" font-size="9" font-weight="bold" text-anchor="middle">${pos[s]}</text>`;
}
}
}
// String names
for(let s=0;s<6;s++){
svg+=`<text x="${startX+s*strGap}" y="${startY+5*fretGap+15}" fill="#888" font-size="10" text-anchor="middle">${STRING_NAMES[s]}</text>`;
}
svg+=`</svg>`;
return svg;
}

function renderTablature(pos,isChord){
let html='<div class="font-mono text-sm leading-relaxed">';
const labels=['e','B','G','D','A','E'];
for(let s=0;s<6;s++){
html+=`<div class="flex items-center gap-1">`;
html+=`<span class="text-[#e6a817] w-4 text-right font-bold">${labels[s]}</span>`;
html+=`<span class="text-gray-600">|</span>`;
if(pos[s]===-1){
html+=`<span class="text-red-400 font-bold px-2">✕</span>`;
}else{
const midi=STRINGS_MIDI[s]+pos[s];
html+=`<span class="note-cell inline-flex items-center justify-center w-7 h-7 bg-[#2a2a4a] rounded text-[#e6a817] font-bold text-xs" onmouseenter="playNote(${midi})" title="${NOTES[midi%12]}${Math.floor(midi/12)-1}">${pos[s]}</span>`;
}
html+=`<span class="text-gray-600">|</span>`;
html+=`</div>`;
}
html+='</div>';
return html;
}

function renderScalePattern(tabData){
const maxFret=15;
let html='<div class="overflow-x-auto"><table class="border-collapse mx-auto">';
const labels=['e','B','G','D','A','E'];
for(let s=0;s<6;s++){
html+='<tr>';
html+=`<td class="text-[#e6a817] text-xs font-bold pr-2 text-right w-6">${labels[s]}</td>`;
for(let f=0;f<=maxFret;f++){
const noteData=tabData[s].find(n=>n.fret===f);
const isRoot=noteData&&((noteData.midi)%12===currentRoot);
const isNote=!!noteData;
let cls='scale-pattern-cell border border-[#2a2a4a]';
if(isRoot)cls+=' active-note';
else if(isNote)cls+=' bg-[#2a2a4a] text-gray-300';
else cls+=' bg-[#1a1a2e] text-transparent';
const midi=isNote?noteData.midi:0;
const hover=isNote?`onmouseenter="playNote(${midi})"`:''
html+=`<td class="${cls}" ${hover}>${isNote?(f):'·'}</td>`;
}
html+='</tr>';
}
// Fret markers
html+='<tr><td></td>';
for(let f=0;f<=maxFret;f++){
const dots=[0,3,5,7,9,12];
const marker=dots.includes(f)?(f===12?'●●':'●'):'';
html+=`<td class="text-center text-[10px] text-gray-600 h-5">${f===0?'':f}</td>`;
}
html+='</tr>';
html+='</table></div>';
return html;
}

function renderScaleTab(tabData){
let html='<div class="font-mono text-xs">';
const labels=['e','B','G','D','A','E'];
for(let s=0;s<6;s++){
html+=`<div class="flex items-center">`;
html+=`<span class="text-[#e6a817] w-4 text-right font-bold">${labels[s]}</span>`;
html+=`<span class="text-gray-600">|</span>`;
for(let f=0;f<=15;f++){
const noteData=tabData[s].find(n=>n.fret===f);
if(noteData){
const isRoot=(noteData.midi%12)===currentRoot;
const bg=isRoot?'bg-[#e6a817] text-[#0f0f1a]':'bg-[#2a2a4a] text-[#e6a817]';
html+=`<span class="note-cell inline-flex items-center justify-center w-6 h-6 ${bg} rounded text-[10px] font-bold" onmouseenter="playNote(${noteData.midi})">${f}</span>`;
}else{
html+=`<span class="inline-flex items-center justify-center w-6 h-6 text-gray-700">-</span>`;
}
}
html+=`<span class="text-gray-600">|</span></div>`;
}
html+='</div>';
return html;
}

function renderStaff(containerId,notes,isChord){
const container=document.getElementById(containerId);
if(!container||typeof Vex==='undefined')return;
try{
container.innerHTML='';
const width=Math.max(500,notes.length*50+100);
const vf=new Vex.Flow.Factory({renderer:{elementId:containerId,width:width,height:200}});
const score=vf.EasyScore();
const system=vf.System({x:10,y:30,width:width-20});

if(isChord){
const vexNotes=notes.map(n=>{
const name=midiToVexName(n);
return name+'/q';
});
// Group into chords of max 4 notes for readability
const chunks=[];
for(let i=0;i<vexNotes.length;i+=4){
chunks.push(vexNotes.slice(i,i+4));
}
const voices=chunks.map(chunk=>{
if(chunk.length===1)return score.voice(score.notes(chunk[0]+'w'));
const noteStr=chunk.join(',');
return score.voice(score.notes(`[${noteStr}]/w`));
});
voices.forEach(v=>{
system.addStave({voices:[v]}).addClef('treble');
});
}else{
const vexNotes=notes.map(n=>{
const name=midiToVexName(n);
return name+'/q';
});
const voice=score.voice(score.notes(vexNotes.join(', ')));
system.addStave({voices:[voice]}).addClef('treble');
}
vf.draw();

// Add hover interactivity to SVG notes
setTimeout(()=>{
const svgEl=container.querySelector('svg');
if(!svgEl)return;
const noteEls=svgEl.querySelectorAll('.vf-notehead, .vf-stem');
let noteIdx=0;
const allNoteEls=svgEl.querySelectorAll('[class*="note"]');
allNoteEls.forEach(el=>{
el.style.cursor='pointer';
el.addEventListener('mouseenter',()=>{
if(notes[noteIdx%notes.length])playNote(notes[noteIdx%notes.length],0.5);
});
el.addEventListener('click',()=>{
if(notes[noteIdx%notes.length])playNote(notes[noteIdx%notes.length],0.5);
});
noteIdx++;
});
},100);
}catch(e){
container.innerHTML=`<p class="text-red-400 text-sm">Error rendering staff: ${e.message}</p>`;
}
}

function midiToVexName(midi){
const names=['c','c#','d','d#','e','f','f#','g','g#','a','a#','b'];
const octave=Math.floor(midi/12)-1;
const note=names[midi%12];
return note+'/'+octave;
}

// Initialize
initRootSelector();
initTypeList();

// Auto-select first chord
setTimeout(()=>{
const firstItem=document.querySelector('.type-item');
if(firstItem)firstItem.click();
},100);
</script>
