function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function midiToFreq(m){return 440*Math.pow(2,(m-69)/12)}

function playNote(midi,dur=0.8){
const ctx=getAudioCtx();const now=ctx.currentTime;const freq=midiToFreq(midi);
const osc1=ctx.createOscillator();osc1.type='triangle';osc1.frequency.value=freq;
const osc2=ctx.createOscillator();osc2.type='sine';osc2.frequency.value=freq*2;
const osc3=ctx.createOscillator();osc3.type='sine';osc3.frequency.value=freq*3;
const g1=ctx.createGain();const g2=ctx.createGain();const g3=ctx.createGain();
g1.gain.setValueAtTime(0.3,now);g1.gain.exponentialRampToValueAtTime(0.001,now+dur);
g2.gain.setValueAtTime(0.1,now);g2.gain.exponentialRampToValueAtTime(0.001,now+dur*0.6);
g3.gain.setValueAtTime(0.03,now);g3.gain.exponentialRampToValueAtTime(0.001,now+dur*0.4);
osc1.connect(g1);g1.connect(ctx.destination);osc2.connect(g2);g2.connect(ctx.destination);osc3.connect(g3);g3.connect(ctx.destination);
osc1.start(now);osc2.start(now);osc3.start(now);
osc1.stop(now+dur);osc2.stop(now+dur*0.6);osc3.stop(now+dur*0.4);
}
function playChord(midiNotes,strumDelay=0.04){midiNotes.forEach((n,i)=>{setTimeout(()=>playNote(n,1.5),i*strumDelay*1000)})}
function playScale(midiNotes){midiNotes.forEach((n,i)=>{setTimeout(()=>playNote(n,0.5),i*250)})}

function getChordPosition(rootIdx,chordId){
const rootName=NOTE_ORDER[rootIdx];
const positions=CHORD_POSITIONS[chordId];
if(positions&&positions[rootName])return positions[rootName].slice();
return generateChordPosition(rootIdx,chordId);
}

function generateChordPosition(rootIdx,chordType){
const allTypes=[].concat(...CHORD_TYPES.map(c=>c.items));
const ct=allTypes.find(t=>t.id===chordType);
if(!ct)return[0,2,2,1,0,0];
const intervals=ct.int;
const rootPc=IDX_TO_PC[rootIdx];
const pcs=intervals.map(i=>(rootPc+i)%12);
const pos=[];
for(let s=0;s<6;s++){
let found=-1;
for(let f=0;f<=4;f++){if(pcs.includes((STRINGS_MIDI[s]+f)%12)){found=f;break;}}
pos.push(found);
}
return pos;
}

function getChordNotes(rootIdx,chordId){
const pos=getChordPosition(rootIdx,chordId);
const notes=[];
for(let s=0;s<6;s++){if(pos[s]!==-1){notes.push(STRINGS_MIDI[s]+pos[s]);}}
return notes;
}

function getScaleNotes(rootIdx,scaleId){
const allTypes=[].concat(...SCALE_TYPES.map(c=>c.items));
const st=allTypes.find(t=>t.id===scaleId);
if(!st)return[];
const rootPc=IDX_TO_PC[rootIdx];
return st.int.map(i=>60+rootPc+i);
}

function getScaleTab(rootIdx,scaleId){
const allTypes=[].concat(...SCALE_TYPES.map(c=>c.items));
const st=allTypes.find(t=>t.id===scaleId);
if(!st)return[];
const rootPc=IDX_TO_PC[rootIdx];
const pcs=st.int.map(i=>(rootPc+i)%12);
const tab=[];
for(let s=0;s<6;s++){
const strNotes=[];
for(let f=0;f<=15;f++){if(pcs.includes((STRINGS_MIDI[s]+f)%12)){strNotes.push({fret:f,midi:STRINGS_MIDI[s]+f});}}
tab.push(strNotes);
}
return tab;
}

function renderChordDiagramSVG(pos){
const w=150,h=180;
const startX=25,startY=35;
const strGap=20,fretGap=28;
let svg=`<svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">`;
const minFret=Math.min(...pos.filter(p=>p!==-1&&p>0));
const showNut=minFret<=0||minFret===Infinity;
if(showNut){svg+=`<rect x="${startX}" y="${startY-3}" width="${strGap*5}" height="4" fill="#00f0ff" rx="1" opacity="0.8"/>`;}
else{svg+=`<text x="${startX-14}" y="${startY+18}" fill="#ff00ff" font-size="12" font-weight="bold" font-family="Orbitron">${minFret}</text>`;}
for(let f=0;f<=5;f++){const y=startY+f*fretGap;svg+=`<line x1="${startX}" y1="${y}" x2="${startX+strGap*5}" y2="${y}" stroke="rgba(0,240,255,0.2)" stroke-width="1"/>`;}
for(let s=0;s<6;s++){const x=startX+s*strGap;svg+=`<line x1="${x}" y1="${startY}" x2="${x}" y2="${startY+5*fretGap}" stroke="rgba(0,240,255,0.15)" stroke-width="${s<3?1.5:1}"/>`;}
const baseFret=showNut?0:minFret-1;
for(let s=0;s<6;s++){
const x=startX+s*strGap;
if(pos[s]===-1){svg+=`<text x="${x}" y="${startY-10}" fill="rgba(255,0,255,0.5)" font-size="14" text-anchor="middle" font-weight="bold">×</text>`;}
else if(pos[s]===0){svg+=`<circle cx="${x}" cy="${startY-2}" r="7" fill="none" stroke="#00f0ff" stroke-width="2"/>`;}
else{
const fret=pos[s]-baseFret;
if(fret>0&&fret<=5){
const y=startY+(fret-0.5)*fretGap;
svg+=`<circle cx="${x}" cy="${y}" r="9" fill="#00f0ff" opacity="0.9" style="filter:drop-shadow(0 0 4px #00f0ff)" class="cursor-pointer" onmouseenter="playNote(${STRINGS_MIDI[s]+pos[s]})"/>`;
svg+=`<text x="${x}" y="${y+4}" fill="#05050f" font-size="10" font-weight="bold" text-anchor="middle">${pos[s]}</text>`;
}
}
}
for(let s=0;s<6;s++){svg+=`<text x="${startX+s*strGap}" y="${startY+5*fretGap+18}" fill="rgba(0,240,255,0.5)" font-size="10" text-anchor="middle" font-family="Orbitron">${STRING_NAMES[s]}</text>`;}
svg+=`</svg>`;
return svg;
}

function renderTablature(pos){
let html='<div class="font-mono text-sm leading-loose">';
const labels=['e','B','G','D','A','E'];
for(let s=0;s<6;s++){
html+=`<div class="flex items-center gap-2">`;
html+=`<span class="neon-magenta w-4 text-right font-bold font-cyber text-xs">${labels[s]}</span>`;
html+=`<span class="text-cyan-500/30">│</span>`;
if(pos[s]===-1){html+=`<span class="text-pink-400/50 font-bold px-2"></span>`;}
else{const midi=STRINGS_MIDI[s]+pos[s];html+=`<span class="note-cell inline-flex items-center justify-center w-8 h-8 bg-[#0a0a2a] border border-cyan-500/20 rounded text-cyan-300 font-bold text-xs font-mono" onmouseenter="playNote(${midi})" title="${NOTE_ORDER[PC_TO_IDX[midi%12]]}${Math.floor(midi/12)-1}">${pos[s]}</span>`;}
html+=`<span class="text-cyan-500/30">│</span></div>`;
}
html+='</div>';
return html;
}

function renderScaleTab(tabData){
let html='<div class="font-mono text-xs">';
const labels=['e','B','G','D','A','E'];
const rootPc=IDX_TO_PC[currentRoot];
for(let s=0;s<6;s++){
html+=`<div class="flex items-center">`;
html+=`<span class="neon-magenta w-4 text-right font-bold font-cyber text-[10px]">${labels[s]}</span>`;
html+=`<span class="text-cyan-500/30">│</span>`;
for(let f=0;f<=15;f++){
const noteData=tabData[s].find(n=>n.fret===f);
if(noteData){const isRoot=(noteData.midi%12)===rootPc;const cls=isRoot?'bg-cyan-400 text-[#05050f] font-black':'bg-[#0a0a2a] border border-cyan-500/20 text-cyan-300';html+=`<span class="note-cell inline-flex items-center justify-center w-6 h-6 ${cls} rounded text-[10px] font-bold" onmouseenter="playNote(${noteData.midi})">${f}</span>`;}
else{html+=`<span class="inline-flex items-center justify-center w-6 h-6 text-cyan-500/10">-</span>`;}
}
html+=`<span class="text-cyan-500/30">│</span></div>`;
}
html+='</div>';
return html;
}

function midiToVexName(midi){
const names=['c','c#','d','d#','e','f','f#','g','g#','a','a#','b'];
const octave=Math.floor(midi/12)-1;
return names[midi%12]+'/'+octave;
}

function renderStaff(containerId,notes,isChord){
const container=document.getElementById(containerId);
if(!container||typeof Vex==='undefined'){if(container)container.innerHTML='<p class="text-pink-400 text-xs font-cyber">Cargando partitura...</p>';return;}
try{
container.innerHTML='';
if(isChord)renderChordStaff(container,notes);
else renderScaleStaff(container,notes);
[10,50,100,200,400,800,1200,2000].forEach(delay=>{
setTimeout(()=>applyStaffColors(container),delay);
});
}catch(e){
container.innerHTML=`<div class="p-4 text-center"><p class="text-pink-400/60 text-xs font-cyber">⚠ PARTITURA NO DISPONIBLE</p><p class="text-gray-600 text-[10px] mt-1">${e.message}</p></div>`;
console.error('Staff render error:',e);
}
}

function renderChordStaff(container,notes){
if(notes.length===0)return;
const width=Math.max(300,400);
const height=180;
const renderer=new Vex.Flow.Renderer(container,Vex.Flow.Renderer.Backends.SVG);
renderer.resize(width,height);
const ctx=renderer.getContext();
ctx.setFont('Arial',10);
const stave=new Vex.Flow.Stave(30,40,width-60);
stave.addClef('treble');
stave.setContext(ctx).draw();
const keys=notes.map(n=>midiToVexName(n)).reverse();
const chordNote=new Vex.Flow.StaveNote({keys:keys,duration:'w'});
const voice=new Vex.Flow.Voice({num_beats:4,beat_value:4,resolution:Vex.Flow.RESOLUTION});
voice.addTickables([chordNote]);
new Vex.Flow.Formatter().joinVoices([voice]).format([voice],width-80);
voice.draw(ctx,stave);
addStaffInteractivity(container,notes);
}

function renderScaleStaff(container,notes){
if(notes.length===0)return;
const totalNotes=notes.length;
const measures=Math.ceil(totalNotes/4);
const totalBeats=measures*4;
const width=Math.max(400,totalBeats*50+100);
const height=180;
const renderer=new Vex.Flow.Renderer(container,Vex.Flow.Renderer.Backends.SVG);
renderer.resize(width,height);
const ctx=renderer.getContext();
ctx.setFont('Arial',10);
const stave=new Vex.Flow.Stave(30,40,width-60);
stave.addClef('treble');
stave.addTimeSignature('4/4');
stave.setContext(ctx).draw();
const vfNotes=[];const noteMap=[];
for(let i=0;i<totalBeats;i++){
if(i<totalNotes){const n=notes[i];const sn=new Vex.Flow.StaveNote({keys:[midiToVexName(n)],duration:'q'});vfNotes.push(sn);noteMap.push(n);}
else{const sr=new Vex.Flow.StaveNote({keys:['b/4'],duration:'qr'});vfNotes.push(sr);noteMap.push(null);}
}
const voice=new Vex.Flow.Voice({num_beats:totalBeats,beat_value:4,resolution:Vex.Flow.RESOLUTION});
voice.addTickables(vfNotes);
new Vex.Flow.Formatter().joinVoices([voice]).format([voice],width-80);
voice.draw(ctx,stave);
addStaffInteractivity(container,noteMap);
}

function applyStaffColors(container){
const svg=container.querySelector('svg');
if(!svg)return;

const CYAN='#00f0ff';
const MAGENTA='#ff00ff';
const ORANGE='#ff6600';

svg.querySelectorAll('line').forEach(el=>{
const x1=parseFloat(el.getAttribute('x1')||0);
const y1=parseFloat(el.getAttribute('y1')||0);
const x2=parseFloat(el.getAttribute('x2')||0);
const y2=parseFloat(el.getAttribute('y2')||0);
const dx=Math.abs(x2-x1);
const dy=Math.abs(y2-y1);
if(dy<3){el.setAttribute('stroke',ORANGE);el.setAttribute('stroke-width','1.5');el.setAttribute('stroke-opacity','1');return;}
if(dx<3&&dy>10&&dy<30){el.setAttribute('stroke',CYAN);el.setAttribute('stroke-width','2.5');return;}
if(dx<3&&dy>=30){el.setAttribute('stroke',ORANGE);el.setAttribute('stroke-width','2');return;}
});

svg.querySelectorAll('path').forEach(el=>{
const fill=el.getAttribute('fill');
const fillNone=fill==='none';
let bbox=null;
try{bbox=el.getBBox();}catch(e){return;}
const bx=bbox.x;const by=bbox.y;const bw=bbox.width;const bh=bbox.height;

if(bx<90&&bh>40){el.setAttribute('fill',MAGENTA);el.setAttribute('stroke',MAGENTA);el.style.filter='drop-shadow(0 0 5px #ff00ff)';return;}
if(bx>55&&bx<140&&bh>15&&bw<40){el.setAttribute('fill',MAGENTA);el.setAttribute('stroke',MAGENTA);return;}
if(bw>15&&bh<5&&!fillNone){el.setAttribute('fill',CYAN);el.setAttribute('stroke',CYAN);return;}
if(bw<12&&bh>15&&bh<35&&bx>90&&!fillNone){el.setAttribute('fill',CYAN);el.setAttribute('stroke',CYAN);return;}
if(bw>5&&bw<15&&bh>10&&bh<25&&bx>90&&!fillNone){el.setAttribute('fill',CYAN);el.setAttribute('stroke',CYAN);return;}
if(bw>100&&bh<3&&fillNone){el.setAttribute('stroke',ORANGE);el.setAttribute('stroke-width','1.5');return;}
if(bw<3&&bh>30){el.setAttribute('fill',ORANGE);el.setAttribute('stroke',ORANGE);return;}
if(bx>90&&fill&&fill!=='none'&&(fill==='#000000'||fill==='#000'||fill==='black')){el.setAttribute('fill',CYAN);el.setAttribute('stroke',CYAN);el.style.filter='drop-shadow(0 0 3px #00f0ff)';return;}
if(bw<10&&bh<15&&bx>90){el.setAttribute('fill',MAGENTA);el.setAttribute('stroke',MAGENTA);return;}
});

svg.querySelectorAll('text').forEach(el=>{el.setAttribute('fill',MAGENTA);el.setAttribute('font-weight','bold');});

svg.querySelectorAll('rect').forEach(el=>{
const w=parseFloat(el.getAttribute('width')||0);
const h=parseFloat(el.getAttribute('height')||0);
const fill=el.getAttribute('fill');
if(w>15&&h<5&&fill&&fill!=='none'){el.setAttribute('fill',CYAN);el.setAttribute('stroke',CYAN);return;}
if(w>100&&h<3){el.setAttribute('fill',ORANGE);return;}
if(w>5&&h<2){el.setAttribute('fill',ORANGE);return;}
});

svg.querySelectorAll('ellipse, circle').forEach(el=>{
el.setAttribute('fill',CYAN);el.setAttribute('stroke',CYAN);el.style.filter='drop-shadow(0 0 3px #00f0ff)';
});
}

function addStaffInteractivity(container,noteMap){
setTimeout(()=>{
const svgEl=container.querySelector('svg');
if(!svgEl)return;
const noteElements=[];
svgEl.querySelectorAll('path').forEach(el=>{
let bbox=null;
try{bbox=el.getBBox();}catch(e){return;}
if(bbox.width>6&&bbox.width<14&&bbox.height>5&&bbox.height<10&&bbox.x>90){
const fill=el.getAttribute('fill');
if(fill==='#00f0ff'||fill==='#000000'||fill==='#000'){noteElements.push(el);}
}
});
noteElements.forEach((el,idx)=>{
if(noteMap[idx]===null||noteMap[idx]===undefined)return;
el.style.cursor='pointer';
el.addEventListener('mouseenter',()=>{playNote(noteMap[idx],0.4);});
el.addEventListener('click',()=>{playNote(noteMap[idx],0.6);});
});
},300);
}

initRootSelector();
initTypeList();
setTimeout(()=>{const firstItem=document.querySelector('.type-item');if(firstItem)firstItem.click();},100);
</script>
